services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flights-local-app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage:/var/www/html/storage
      - ./public/uploads:/var/www/html/public/uploads
    networks:
      - flights-local-net
    depends_on:
      - mysql

  nginx:
    image: nginx:stable-alpine
    container_name: flights-local-nginx
    restart: unless-stopped
    ports:
      - "8095:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - flights-local-net
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: flights-local-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_local_pass
      MYSQL_DATABASE: homestead
      MYSQL_USER: flights_user
      MYSQL_PASSWORD: flights_local_pass
    ports:
      - "3309:3306"
    volumes:
      - flights_local_mysql_data:/var/lib/mysql
    networks:
      - flights-local-net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: flights-local-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8096:80"
    depends_on:
      - mysql
    networks:
      - flights-local-net

networks:
  flights-local-net:
    driver: bridge

volumes:
  flights_local_mysql_data: